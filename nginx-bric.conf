# Rate limiting zone
limit_req_zone $binary_remote_addr zone=bric_api:10m rate=500r/m;
limit_req_zone $binary_remote_addr zone=bric_login:10m rate=5r/m;

server {
    listen 80;
    server_name bmsretail.my.id www.bmsretail.my.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bmsretail.my.id www.bmsretail.my.id;

    ssl_certificate     /etc/letsencrypt/live/bmsretail.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bmsretail.my.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /var/www/bric;
    index index.html;

    server_tokens off;

    add_header X-Frame-Options           "DENY"                            always;
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header X-XSS-Protection          "1; mode=block"                   always;
    add_header Referrer-Policy           "no-referrer"                     always;
    add_header X-Robots-Tag              "noindex, nofollow, noarchive"    always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;

    # ── Blokir semua search engine & crawler ──────────────────────────────
    if ($http_user_agent ~* (googlebot|bingbot|slurp|duckduckbot|baiduspider|yandex|sogou|facebot|ia_archiver|semrushbot|ahrefsbot|mj12bot|dotbot|blexbot|petalbot|bytespider|gptbot|claudebot|ccbot|anthropic)) {
        return 403;
    }

    location ~ /\. { deny all; }
    location = /robots.txt  { add_header X-Robots-Tag "noindex" always; }

    # ── Sync endpoints (Apps Script) — body besar, tanpa rate limit ───────
    location ~ ^/api/(warroom/(segmen|speedcash|ekspedisi|ekspedisi-produk|fastpay|farming|pa-produk|pa-arpu|mgm|dm-fastpay|instaqris-trx|asdp|pa-asdp|pa-lpd|bumdes|lpd|hunter|reconciliation(/mandiri|/bri|/bri-bifast)?)|data-raw/(outlet|affiliate|qris|trx))/sync$ {
        client_max_body_size 30m;
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location /api/auth/login {
        limit_req zone=bric_login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass         http://127.0.0.1:3001/api/auth/login;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        limit_req zone=bric_api burst=100 nodelay;
        limit_req_status 429;
        proxy_pass         http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

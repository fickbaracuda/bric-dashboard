# Rate limiting zone
limit_req_zone $binary_remote_addr zone=bric_api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=bric_login:10m rate=5r/m;

server {
    listen 80;
    server_name bmsretail.my.id www.bmsretail.my.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bmsretail.my.id www.bmsretail.my.id;

    # SSL (diisi otomatis oleh certbot)
    ssl_certificate     /etc/letsencrypt/live/bmsretail.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bmsretail.my.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /var/www/bric;
    index index.html;

    # Sembunyikan versi Nginx
    server_tokens off;

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options           "DENY"                            always;
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header X-XSS-Protection          "1; mode=block"                   always;
    add_header Referrer-Policy           "no-referrer"                     always;
    add_header X-Robots-Tag              "noindex, nofollow, noarchive"    always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;

    # ── Blokir semua search engine & crawler ──────────────────
    if ($http_user_agent ~* (googlebot|bingbot|slurp|duckduckbot|baiduspider|yandex|sogou|facebot|ia_archiver|semrushbot|ahrefsbot|mj12bot|dotbot|blexbot|petalbot|bytespider|gptbot|claudebot|ccbot|anthropic)) {
        return 403;
    }

    # ── Blokir akses langsung ke file sensitif ─────────────────
    location ~ /\. { deny all; }
    location = /robots.txt  { add_header X-Robots-Tag "noindex" always; }

    # ── API dengan rate limiting ───────────────────────────────
    location /api/auth/login {
        limit_req zone=bric_login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass         http://127.0.0.1:3001/api/auth/login;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        limit_req zone=bric_api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass         http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Frontend SPA ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
